<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a6678" />
    <title>Flowcraft</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="game status">
        <div>
          <p class="eyebrow">FLOWCRAFT</p>
          <h1>Draw the impossible stream</h1>
        </div>
        <div class="stats">
          <span id="levelLabel">Level 1</span>
          <span id="timerLabel">10.0</span>
          <span id="inkLabel">Ink 100%</span>
          <span id="gemLabel">Gems 0/0</span>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="game" width="390" height="720" aria-label="water routing game"></canvas>
        <div id="overlay" class="overlay">
          <div class="panel">
            <p class="mark">WATERLINE</p>
            <h2 id="overlayTitle">Ready?</h2>
            <p id="overlayText">Sketch glowing rails before the spring bursts. Bend the water into the collector.</p>
            <button id="primaryBtn" type="button">Start Run</button>
          </div>
        </div>
      </section>

      <nav class="controls" aria-label="game controls">
        <button id="undoBtn" type="button" title="Undo last line">↶</button>
        <button id="clearBtn" type="button" title="Clear rails">Clear</button>
        <button id="restartBtn" type="button" title="Restart level">↻</button>
        <button id="fullBtn" type="button" title="Fullscreen">⛶</button>
      </nav>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
